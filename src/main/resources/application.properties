server.port=${PORT:8080}

# ==========================================
# 1. Configuração do Banco de Dados (Supabase)
# ==========================================
spring.datasource.url=jdbc:postgresql://aws-1-sa-east-1.pooler.supabase.com:5432/postgres
spring.datasource.username=postgres.fsllbkajuxiqmawrlucl
# A senha agora é uma variável escondida (Vais colocar a senha real lá no painel do Render)
