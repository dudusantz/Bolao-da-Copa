<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - Bolão Ademicon</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        :root {
            --primary: #E31B23;
            --primary-hover: #b8141b;
            --bg-color: #F3F4F6;
            --card-bg: #ffffff;
            --text-dark: #0f172a;
            --text-muted: #475569;
            --border-light: #e2e8f0;
            --danger: #dc2626;
            --danger-bg: #fef2f2;
            --success: #059669;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }

        .form-container {
            width: 100%;
            max-width: 450px;
            background: var(--card-bg);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(226, 232, 240, 0.6);
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeSlideUp 0.5s cubic-bezier(0.4, 0, 0.2, 1) both;
        }

        @keyframes fadeSlideUp { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .title-page {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 30px;
            text-align: center;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .input-group { width: 100%; margin-bottom: 20px; }
        
        .input-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-control {
            width: 100%;
            padding: 14px 16px;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-dark);
            background: #f8fafc;
            border: 2px solid var(--border-light);
            border-radius: 12px;
            transition: all 0.2s ease-out;
            outline: none;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        .input-control::placeholder { color: #94a3b8; font-weight: 500; }
        .input-control:focus { background: #ffffff; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(227, 27, 35, 0.1); transform: translateY(-2px); }

        .input-error { border-color: var(--danger) !important; background-color: var(--danger-bg) !important; color: var(--danger); }
        
        .error-message {
            color: var(--danger);
            font-size: 0.85rem;
            font-weight: 700;
            margin-top: 8px;
            display: none;
            align-items: center;
            gap: 6px;
            background: var(--danger-bg);
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid #fecaca;
        }

        .btn-ademicon {
            width: 100%;
            padding: 15px;
            font-size: 1.05rem;
            font-weight: 700;
            color: #FFF;
            background-color: var(--primary);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 10px;
            box-shadow: 0 4px 12px rgba(227, 27, 35, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-ademicon:hover:not(:disabled) { background-color: var(--primary-hover); transform: translateY(-2px); box-shadow: 0 6px 15px rgba(227, 27, 35, 0.3); }
        .btn-ademicon:active:not(:disabled) { transform: translateY(0); }
        .btn-ademicon:disabled { opacity: 0.7; cursor: not-allowed; }

        .link-secundario {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-muted);
            text-decoration: none;
            margin-top: 25px;
            transition: color 0.2s;
            display: inline-block;
        }
        .link-secundario strong { color: var(--text-dark); text-decoration: underline; text-decoration-color: transparent; transition: 0.2s; }
        .link-secundario:hover strong { color: var(--primary); text-decoration-color: var(--primary); }

        /* MODO MOBILE */
        @media (max-width: 500px) {
            .form-container { padding: 30px 20px; border-radius: 20px; width: 100%; }
            body { padding: 15px; }
            .title-page { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h2 class="title-page"><i class="ph-fill ph-shield-check" style="color: var(--primary);"></i> Criar Conta</h2>

        <form id="form-registro" style="width: 100%;">
            
            <div class="input-group">
                <label class="input-label" for="nome">Nome Completo</label>
                <input type="text" id="nome" class="input-control" placeholder="Ex: João Alves" required autocomplete="name" maxlength="60">
            </div>

            <div class="input-group">
                <label class="input-label" for="email">E-mail de Acesso</label>
                <input type="email" id="email" class="input-control" placeholder="teuemail@exemplo.com" required autocomplete="email" maxlength="100">
            </div>

            <div class="input-group">
                <label class="input-label" for="senha">Crie sua Senha</label>
                <input type="password" id="senha" class="input-control" placeholder="Mínimo de 6 caracteres" required minlength="6" maxlength="30">
            </div>

            <div class="input-group" style="margin-bottom: 10px;">
                <label class="input-label" for="confirmar_senha">Repita a Senha</label>
                <input type="password" id="confirmar_senha" class="input-control" placeholder="Confirme a senha digitada acima" required minlength="6" maxlength="30">
            </div>
            
            <div id="erro-senha" class="error-message">
                <i class="ph-bold ph-warning-circle" style="font-size: 1.2rem;"></i> As senhas não coincidem.
            </div>

            <button type="submit" id="btn-submit" class="btn-ademicon" style="margin-top: 25px;">
                Cadastrar Agora <i class="ph-bold ph-arrow-right"></i>
            </button>

            <div style="text-align: center;">
                <a href="/login" class="link-secundario">Já tens uma conta? <strong>Faça Login</strong></a>
            </div>
        </form>
    </div>

    <script>
        document.getElementById('nome').addEventListener('input', function() {
            this.value = this.value.replace(/[^a-zA-ZÀ-ÿ\s]/g, '');
        });

        document.getElementById('form-registro').addEventListener('submit', async function(event) {
            event.preventDefault();

            const btnSubmit = document.getElementById('btn-submit');
            const nome = document.getElementById('nome').value.trim();
            const email = document.getElementById('email').value.trim();
            const senha = document.getElementById('senha');
            const confirmarSenha = document.getElementById('confirmar_senha');
            const erroSenhaMsg = document.getElementById('erro-senha');

            if (senha.value !== confirmarSenha.value) {
                confirmarSenha.classList.add('input-error');
                senha.classList.add('input-error');
                erroSenhaMsg.style.display = 'flex';
                
                confirmarSenha.addEventListener('input', limparErro);
                senha.addEventListener('input', limparErro);
                confirmarSenha.focus();
                return; 
            }

            const textoOriginal = btnSubmit.innerHTML;
            btnSubmit.innerHTML = '<i class="ph-bold ph-spinner ph-spin"></i> Criando conta...';
            btnSubmit.disabled = true;

            const payload = {
                nome: nome,
                email: email,
                senha: senha.value
            };

            try {
                const resposta = await fetch('/api/auth/registrar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (resposta.ok) {
                    btnSubmit.innerHTML = '<i class="ph-bold ph-check"></i> Sucesso!';
                    btnSubmit.style.backgroundColor = 'var(--success)';
                    
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 1000);
                } else {
                    const err = await resposta.text();
                    alert("Atenção: " + err);
                    restaurarBotao(btnSubmit, textoOriginal);
                }
            } catch (erro) {
                console.error(erro);
                alert("Erro de conexão com o servidor.");
                restaurarBotao(btnSubmit, textoOriginal);
            }
        });

        function limparErro() {
            document.getElementById('senha').classList.remove('input-error');
            document.getElementById('confirmar_senha').classList.remove('input-error');
            document.getElementById('erro-senha').style.display = 'none';
        }

        function restaurarBotao(btn, texto) {
            btn.innerHTML = texto;
            btn.disabled = false;
        }
    </script>
</body>
</html>
