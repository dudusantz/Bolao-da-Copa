<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Comando - Bolão Ademicon</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root { --primary: #E31B23; --bg-color: #f1f5f9; --card-bg: #ffffff; --text-dark: #0f172a; --text-muted: #64748b; --border: #e2e8f0; --success: #059669; --danger: #dc2626; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-dark); display: flex; min-height: 100vh; flex-direction: row; overflow-x: hidden; }

        /* SIDEBAR ADMIN */
        .sidebar { width: 280px; background: #0f172a; color: white; padding: 2rem 1.5rem; display: flex; flex-direction: column; gap: 2rem; box-shadow: 4px 0 15px rgba(0,0,0,0.1); z-index: 10; }
        .brand { font-size: 1.4rem; font-weight: 800; display: flex; align-items: center; gap: 10px; color: #f8fafc; }
        .nav-links { display: flex; flex-direction: column; gap: 8px; }
        .nav-btn { background: transparent; color: #94a3b8; border: none; padding: 12px 16px; border-radius: 10px; text-align: left; font-size: 1.05rem; font-weight: 600; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 10px; }
        .nav-btn:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-btn.active { background: var(--primary); color: white; }
        .back-btn { margin-top: auto; background: rgba(255,255,255,0.1); padding: 12px; text-align: center; border-radius: 8px; color: white; text-decoration: none; font-weight: 600; transition: 0.2s; }
        .back-btn:hover { background: rgba(255,255,255,0.2); }

        /* MAIN CONTENT */
        .main-content { flex: 1; padding: 3rem; overflow-y: auto; }
        .page-header { margin-bottom: 2rem; }
        .page-title { font-size: 2rem; font-weight: 800; letter-spacing: -0.5px; }
        .page-desc { color: var(--text-muted); }

        .tab-content { display: none; animation: fadeIn 0.4s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* CARDS & INPUTS */
        .admin-card { background: var(--card-bg); border-radius: 16px; padding: 25px; box-shadow: 0 4px 15px -3px rgba(0,0,0,0.05); border: 1px solid var(--border); margin-bottom: 20px; }
        
        .fase-selector { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; padding-bottom: 20px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
        .fase-selector select { padding: 12px 20px; font-size: 1.1rem; font-weight: 700; border-radius: 10px; border: 2px solid var(--border); background: #f8fafc; color: var(--text-dark); cursor: pointer; outline: none; width: 100%; max-width: 300px; }
        .fase-selector select:focus { border-color: var(--primary); }

        .config-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .input-group label { display: block; font-size: 0.9rem; font-weight: 700; color: var(--text-muted); margin-bottom: 8px; }
        .input-group input { width: 100%; padding: 14px; font-size: 1.3rem; font-weight: 800; border-radius: 10px; border: 2px solid var(--border); background: #f8fafc; text-align: center; outline: none; transition: 0.2s; }
        .input-group input:focus { border-color: var(--primary); background: white; }
        
        .btn-action { background: var(--primary); color: white; border: none; padding: 14px 24px; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; transition: 0.2s; box-shadow: 0 4px 12px rgba(227, 27, 35, 0.2); width: 100%; justify-content: center; }
        .btn-action:hover { background: #b8141b; transform: translateY(-2px); }

        /* LISTA DE JOGOS */
        .match-row { display: flex; justify-content: space-between; align-items: center; padding: 20px; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 15px; background: white; flex-wrap: wrap; gap: 15px; }
        .match-info { flex: 1; min-width: 200px; }
        .match-info h4 { font-size: 1.2rem; margin-bottom: 4px; }
        .match-info span { font-size: 0.85rem; font-weight: 600; color: var(--primary); background: #fee2e2; padding: 4px 10px; border-radius: 8px; display: inline-block;}
        .score-inputs { display: flex; align-items: center; gap: 10px; width: 100%; justify-content: flex-start; flex-wrap: wrap;}
        .score-inputs input { width: 60px; height: 50px; text-align: center; font-size: 1.5rem; font-weight: 800; border: 2px solid var(--border); border-radius: 8px; outline: none; }
        .score-inputs input:focus { border-color: var(--primary); }

        input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; appearance: textfield; text-align: center; padding: 0; }

        /* =========================================
           SISTEMA DE TOASTS (NOTIFICAÇÕES FLUTUANTES)
           ========================================= */
        #toast-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 9999;
            pointer-events: none; /* Impede que o clique seja bloqueado pelo container invisível */
        }

        .toast {
            background: white;
            color: var(--text-dark);
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            font-size: 0.95rem;
            transform: translateX(150%);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            pointer-events: auto; /* Reativa o clique apenas na notificação */
        }

        .toast.show {
            transform: translateX(0);
            opacity: 1;
        }

        .toast.success { border-left: 6px solid var(--success); }
        .toast.success i { color: var(--success); font-size: 1.5rem; }
        
        .toast.error { border-left: 6px solid var(--danger); }
        .toast.error i { color: var(--danger); font-size: 1.5rem; }

        /* MEDIA QUERIES MOBILE */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; padding: 1rem; flex-direction: row; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;}
            .brand { width: 100%; justify-content: center; margin-bottom: 10px;}
            .nav-links { flex-direction: row; gap: 10px; width: 100%; justify-content: center;}
            .nav-btn { font-size: 0.9rem; padding: 8px 12px; }
            .back-btn { margin-top: 10px; width: 100%; }
            .main-content { padding: 1.5rem 1rem; }
            .page-title { font-size: 1.5rem; }
            .score-inputs button { width: 100%; margin-top: 10px;}
            #toast-container { bottom: 20px; right: 20px; left: 20px; }
            .toast { width: 100%; padding: 14px 20px; font-size: 0.85rem;}
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="brand"><i class="ph-fill ph-shield-check"></i> Centro de Comando</div>
        <div class="nav-links">
            <button class="nav-btn active" onclick="switchAdminTab('jogos')"><i class="ph-bold ph-soccer-ball"></i> Encerrar Partidas</button>
            <button class="nav-btn" onclick="switchAdminTab('regras')"><i class="ph-bold ph-sliders"></i> Regras de Pontos</button>
        </div>
        <a href="/index.html" class="back-btn"><i class="ph-bold ph-arrow-left"></i> Voltar ao Sistema</a>
    </aside>

    <main class="main-content">
        
        <div id="tab-jogos" class="tab-content active">
            <div class="page-header">
                <h1 class="page-title">Partidas Pendentes</h1>
                <p class="page-desc">Lance o placar oficial para distribuir os pontos da rodada.</p>
            </div>
            <div id="lista-admin">
                <p>A carregar jogos...</p>
            </div>
        </div>

        <div id="tab-regras" class="tab-content">
            <div class="page-header">
                <h1 class="page-title">Engenharia de Pontuação</h1>
                <p class="page-desc">Configure os pesos dos acertos de acordo com a fase do torneio.</p>
            </div>
            
            <div class="admin-card">
                <div class="fase-selector">
                    <label style="font-weight: 700; color: var(--text-dark); width: 100%;">Selecione a Fase:</label>
                    <select id="select-fase" onchange="carregarConfiguracao(this.value)">
                        <option value="Fase de Grupos">Fase de Grupos</option>
                        <option value="16 Avos de Final">16 Avos de Final</option>
                        <option value="Oitavas de Final">Oitavas de Final</option>
                        <option value="Quartas de Final">Quartas de Final</option>
                        <option value="Semifinais">Semifinais</option>
                        <option value="Final">Final</option>
                    </select>
                </div>

                <div class="config-grid">
                    <div class="input-group">
                        <label>Placar Exato (Cheio)</label>
                        <input type="number" id="cfg_exato" placeholder="Ex: 25">
                    </div>
                    <div class="input-group">
                        <label>Acertou Vencedor/Empate</label>
                        <input type="number" id="cfg_vencedor" placeholder="Ex: 10">
                    </div>
                    <div class="input-group">
                        <label>Acertou Gols 1 Equipa</label>
                        <input type="number" id="cfg_golo" placeholder="Ex: 5">
                    </div>
                </div>
                <button class="btn-action" onclick="salvarConfiguracao()">
                    <i class="ph-bold ph-floppy-disk"></i> Salvar Regras desta Fase
                </button>
            </div>
        </div>

    </main>

    <div id="toast-container"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            carregarJogosParaAdmin();
            carregarConfiguracao(document.getElementById('select-fase').value);
        });

        // --- MOTOR DE NOTIFICAÇÕES (TOAST) ---
        function showToast(mensagem, tipo = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${tipo}`;
            
            const icone = tipo === 'success' ? 'ph-check-circle' : 'ph-warning-circle';
            
            toast.innerHTML = `<i class="ph-fill ${icone}"></i> <span>${mensagem}</span>`;
            container.appendChild(toast);
            
            // Dispara a animação de entrada com um micro-atraso
            setTimeout(() => toast.classList.add('show'), 10);
            
            // Remove automaticamente após 3.5 segundos
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400); // Espera a animação de saída terminar para remover do HTML
            }, 3500);
        }

        function switchAdminTab(tabName) {
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            event.currentTarget.classList.add('active');
            document.getElementById(`tab-${tabName}`).classList.add('active');
        }

        async function carregarConfiguracao(faseSelecionada) {
            try {
                const res = await fetch(`/admin/configuracao/${encodeURIComponent(faseSelecionada)}`);
                if (res.ok) {
                    const config = await res.json();
                    document.getElementById('cfg_exato').value = config.pontosPlacarExato;
                    document.getElementById('cfg_vencedor').value = config.pontosVencedor;
                    document.getElementById('cfg_golo').value = config.pontosGoloEquipa;
                }
            } catch(e) { console.error("Erro ao ler configurações"); }
        }

        async function salvarConfiguracao() {
            const faseAtual = document.getElementById('select-fase').value;
            const payload = {
                fase: faseAtual,
                pontosPlacarExato: parseInt(document.getElementById('cfg_exato').value),
                pontosVencedor: parseInt(document.getElementById('cfg_vencedor').value),
                pontosGoloEquipa: parseInt(document.getElementById('cfg_golo').value)
            };
            
            try {
                const btn = event.currentTarget;
                btn.innerHTML = '<i class="ph-bold ph-spinner ph-spin"></i> Salvando...';
                
                const res = await fetch('/admin/configuracao', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if (res.ok) {
                    setTimeout(() => {
                        showToast(`Regras da [${faseAtual}] atualizadas com sucesso!`, 'success');
                        btn.innerHTML = '<i class="ph-bold ph-floppy-disk"></i> Salvar Regras desta Fase';
                    }, 500);
                } else {
                    showToast("Falha de permissão ao salvar.", 'error');
                    btn.innerHTML = '<i class="ph-bold ph-floppy-disk"></i> Salvar Regras desta Fase';
                }
            } catch(e) { 
                showToast("Erro de conexão com o servidor.", 'error');
                btn.innerHTML = '<i class="ph-bold ph-floppy-disk"></i> Salvar Regras desta Fase';
            }
        }

        async function carregarJogosParaAdmin() {
            try {
                const res = await fetch('/partidas');
                const partidas = await res.json();
                
                const container = document.getElementById('lista-admin');
                container.innerHTML = '';

                const jogosAbertos = partidas.filter(p => !p.finalizada);

                if(jogosAbertos.length === 0) {
                    container.innerHTML = '<div class="admin-card" style="text-align: center; color: #64748b; font-weight: bold;">Nenhuma partida pendente de encerramento no momento.</div>';
                    return;
                }

                jogosAbertos.forEach(p => {
                    container.innerHTML += `
                        <div class="match-row" id="card_${p.id}">
                            <div class="match-info">
                                <h4>${p.equipaA} vs ${p.equipaB}</h4>
                                <span>${p.fase}</span>
                            </div>
                            <div class="score-inputs">
                                <input type="number" id="realA_${p.id}" placeholder="0" min="0">
                                <span style="color: #94a3b8; font-weight: bold;">X</span>
                                <input type="number" id="realB_${p.id}" placeholder="0" min="0">
                                <button class="btn-action" style="padding: 12px 20px; font-size: 0.9rem;" onclick="encerrarJogo(event, ${p.id})">Encerrar</button>
                            </div>
                        </div>
                    `;
                });
            } catch (e) {
                showToast("Erro ao carregar jogos ou acesso negado.", 'error');
            }
        }

        async function encerrarJogo(event, idPartida) {
            const btn = event.currentTarget;
            const goloA = document.getElementById(`realA_${idPartida}`).value;
            const goloB = document.getElementById(`realB_${idPartida}`).value;

            if (goloA === '' || goloB === '') {
                showToast("Preencha o placar oficial completo!", 'error');
                return;
            }

            if(confirm("ATENÇÃO: Encerrar a partida acionará o cálculo de pontos de todos os usuários baseado nas regras desta fase. Confirma?")) {
                btn.innerHTML = '<i class="ph-bold ph-spinner ph-spin"></i>';
                btn.disabled = true;

                try {
                    const resposta = await fetch(`/admin/partidas/${idPartida}/encerrar`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ golosEquipaA: parseInt(goloA), golosEquipaB: parseInt(goloB) })
                    });

                    if (resposta.ok) {
                        document.getElementById(`card_${idPartida}`).style.display = 'none';
                        showToast("Partida encerrada e pontos distribuídos!", 'success');
                    } else {
                        const err = await resposta.json();
                        showToast("Erro: " + err.erro, 'error');
                        btn.innerHTML = 'Encerrar';
                        btn.disabled = false;
                    }
                } catch (e) {
                    showToast("Erro crítico no servidor.", 'error');
                    btn.innerHTML = 'Encerrar';
                    btn.disabled = false;
                }
            }
        }
    </script>
</body>
</html>
