<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Senha - Bolão Time Lion</title>
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="auth-page">

    <div class="auth-card">
        <h2 class="title-page"><i class="ph-bold ph-lock-simple-open" style="color: var(--primary);"></i> Nova Senha</h2>
        <p class="subtitle-page">Defina uma nova senha segura para a sua conta</p>

        <form id="form-redefinir" class="auth-form">
            <div class="input-group">
                <label class="input-label" for="senha">Nova Senha</label>
                <input type="password" id="senha" class="input-control" placeholder="Mínimo 6 caracteres" required minlength="6" maxlength="30">
            </div>

            <div class="input-group">
                <label class="input-label" for="confirmar_senha">Confirme a Nova Senha</label>
                <input type="password" id="confirmar_senha" class="input-control" placeholder="Repita a senha digitada acima" required minlength="6" maxlength="30">
            </div>

            <div id="erro-senha" class="error-message">
                <i class="ph-bold ph-warning-circle" style="font-size: 1.2rem;"></i> As senhas não coincidem.
            </div>

            <button type="submit" id="btn-submit" class="btn-timelion">
                Atualizar Minha Senha <i class="ph-bold ph-shield-check"></i>
            </button>
        </form>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            alert("Link inválido ou expirado.");
            window.location.href = '/login';
        }

        document.getElementById('form-redefinir').addEventListener('submit', async function(e) {
            e.preventDefault();
            const senha = document.getElementById('senha');
            const confirmar = document.getElementById('confirmar_senha');
            const erroMsg = document.getElementById('erro-senha');
            const btn = document.getElementById('btn-submit');

            if (senha.value !== confirmar.value) {
                senha.classList.add('input-error');
                confirmar.classList.add('input-error');
                erroMsg.style.display = 'flex';
                return;
            }

            erroMsg.style.display = 'none';
            senha.classList.remove('input-error');
            confirmar.classList.remove('input-error');

            const textoOriginal = btn.innerHTML;
            btn.innerHTML = '<i class="ph-bold ph-spinner ph-spin"></i> Salvando...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/auth/redefinir-senha', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: token, senha: senha.value })
                });

                if (res.ok) {
                    btn.innerHTML = '<i class="ph-bold ph-check"></i> Senha Atualizada!';
                    btn.style.background = 'linear-gradient(135deg, var(--success), #047857)';
                    setTimeout(() => window.location.href = '/login', 1500);
                } else {
                    alert("Link inválido ou expirado. Solicite uma nova redefinição.");
                    btn.innerHTML = textoOriginal;
                    btn.disabled = false;
                }
            } catch(err) {
                alert("Erro de conexão.");
                btn.innerHTML = textoOriginal;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
