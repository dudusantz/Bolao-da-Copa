<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha - Bolão Time Lion</title>
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="auth-page">

    <div class="auth-card">
        <h2 class="title-page"><i class="ph-bold ph-keyhole" style="color: var(--primary);"></i> Recuperar Senha</h2>
        <p class="desc-page">Insira o e-mail cadastrado na sua conta. Enviaremos um link seguro para você criar uma nova senha.</p>

        <form id="form-recuperar" class="auth-form">
            <div class="input-group">
                <label class="input-label" for="email">E-mail Cadastrado</label>
                <input type="email" id="email" class="input-control" placeholder="exemplo@email.com" required maxlength="100">
            </div>

            <button type="submit" id="btn-submit" class="btn-timelion">
                Enviar Link de Resgate <i class="ph-bold ph-paper-plane-launch"></i>
            </button>

            <a href="/login" class="link-secundario">Voltar para o <strong>Login</strong></a>
        </form>
    </div>

    <script>
        document.getElementById('form-recuperar').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            const emailVal = document.getElementById('email').value.trim();

            btn.innerHTML = '<i class="ph-bold ph-spinner ph-spin"></i> Processando...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/auth/recuperar-senha', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: emailVal })
                });

                if (res.ok) {
                    btn.innerHTML = '<i class="ph-bold ph-check-circle"></i> E-mail Enviado!';
                    btn.style.background = 'linear-gradient(135deg, var(--success), #047857)';
                    alert("Se o e-mail inserido estiver correto, as instruções de redefinição chegarão em alguns instantes.");
                } else {
                    alert("Ocorreu uma falha no processamento. Tente novamente.");
                    btn.innerHTML = 'Enviar Link de Resgate <i class="ph-bold ph-paper-plane-launch"></i>';
                    btn.disabled = false;
                }
            } catch(err) {
                alert("Erro de conexão com o Back-end.");
                btn.innerHTML = 'Enviar Link de Resgate <i class="ph-bold ph-paper-plane-launch"></i>';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
