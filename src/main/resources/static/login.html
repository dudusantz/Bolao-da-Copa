<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Bolão Ademicon</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        :root {
            /* Paleta do Dashboard */
            --primary: #E31B23;
            --primary-hover: #b8141b;
            --bg-color: #F3F4F6;
            --card-bg: #ffffff;
            --text-dark: #0f172a;
            --text-muted: #475569;
            --border-light: #e2e8f0;
            --danger: #dc2626;
            --danger-bg: #fef2f2;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }

        .form-container {
            width: 100%;
            max-width: 420px;
            background: var(--card-bg);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(226, 232, 240, 0.6);
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeSlideUp 0.5s cubic-bezier(0.4, 0, 0.2, 1) both;
        }

        @keyframes fadeSlideUp { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .title-page {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 30px;
            text-align: center;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .input-group { width: 100%; margin-bottom: 20px; }
        
        .input-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-control {
            width: 100%;
            padding: 14px 16px;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-dark);
            background: #f8fafc;
            border: 2px solid var(--border-light);
            border-radius: 12px;
            transition: all 0.2s ease-out;
            outline: none;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        .input-control::placeholder { color: #94a3b8; font-weight: 500; }
        .input-control:focus { background: #ffffff; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(227, 27, 35, 0.1); transform: translateY(-2px); }

        .error-message {
            color: var(--danger);
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 15px;
            display: none;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: var(--danger-bg);
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid #fecaca;
            width: 100%;
        }

        /* --- OPÇÕES DE LOGIN (Checkbox e Recuperar Senha) --- */
        .form-options {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            margin-top: -5px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .checkbox-group input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border: 2px solid var(--border-light);
            border-radius: 4px;
            background-color: #f8fafc;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .checkbox-group input[type="checkbox"]:checked {
            background-color: var(--primary);
            border-color: var(--primary);
        }

        .checkbox-group input[type="checkbox"]:checked::after {
            content: "✔";
            color: white;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .checkbox-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            user-select: none;
        }

        .link-recuperar {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--primary);
            text-decoration: none;
            transition: 0.2s;
        }

        .link-recuperar:hover {
            color: var(--primary-hover);
            text-decoration: underline;
        }

        /* Botão Primário */
        .btn-ademicon {
            width: 100%;
            padding: 15px;
            font-size: 1.05rem;
            font-weight: 700;
            color: #FFF;
            background-color: var(--primary);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(227, 27, 35, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-ademicon:hover:not(:disabled) { background-color: var(--primary-hover); transform: translateY(-2px); box-shadow: 0 6px 15px rgba(227, 27, 35, 0.3); }
        .btn-ademicon:active:not(:disabled) { transform: translateY(0); }
        .btn-ademicon:disabled { opacity: 0.7; cursor: not-allowed; }

        /* Link Secundário */
        .link-secundario {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-muted);
            text-decoration: none;
            margin-top: 25px;
            transition: color 0.2s;
            display: inline-block;
        }
        .link-secundario strong { color: var(--text-dark); text-decoration: underline; text-decoration-color: transparent; transition: 0.2s; }
        .link-secundario:hover strong { color: var(--primary); text-decoration-color: var(--primary); }

        @media (max-width: 500px) {
            .form-container { padding: 30px 20px; border-radius: 20px; }
            body { padding: 15px; }
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h2 class="title-page"><i class="ph-fill ph-sign-in" style="color: var(--primary);"></i> Acessar Conta</h2>

        <div id="erro-login" class="error-message">
            <i class="ph-bold ph-warning-circle" style="font-size: 1.2rem;"></i> E-mail ou senha incorretos.
        </div>

        <form id="form-login" style="width: 100%;">
            
            <div class="input-group">
                <label class="input-label" for="email">E-mail</label>
                <input type="email" id="email" class="input-control" placeholder="seuemail@exemplo.com" required autocomplete="email">
            </div>

            <div class="input-group" style="margin-bottom: 15px;">
                <label class="input-label" for="senha">Senha</label>
                <input type="password" id="senha" class="input-control" placeholder="Digita a tua senha" required>
            </div>

            <div class="form-options">
                <label class="checkbox-group">
                    <input type="checkbox" id="lembrar" name="remember-me"> 
                    <span>Manter conectado</span>
                </label>
                <a href="/recuperar-senha" class="link-recuperar">Esqueceu a senha?</a>
            </div>

            <button type="submit" id="btn-submit" class="btn-ademicon">
                Entrar <i class="ph-bold ph-arrow-right"></i>
            </button>

            <div style="text-align: center;">
                <a href="/cadastro" class="link-secundario">Ainda não tens conta? <strong>Cadastre-se</strong></a>
            </div>
        </form>
    </div>

    <script>
        document.getElementById('form-login').addEventListener('submit', async function(event) {
            event.preventDefault();

            const btnSubmit = document.getElementById('btn-submit');
            const email = document.getElementById('email').value.trim();
            const senha = document.getElementById('senha').value;
            const lembrarMe = document.getElementById('lembrar').checked;
            const erroLoginMsg = document.getElementById('erro-login');

            // Esconde o erro sempre que houver uma nova tentativa
            erroLoginMsg.style.display = 'none';

            const textoOriginal = btnSubmit.innerHTML;
            btnSubmit.innerHTML = '<i class="ph-bold ph-spinner ph-spin"></i> Autenticando...';
            btnSubmit.disabled = true;

            const payload = {
                email: email,
                senha: senha
            };

            try {
                const resposta = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (resposta.ok) {
                    btnSubmit.innerHTML = '<i class="ph-bold ph-check"></i> Redirecionando...';
                    btnSubmit.style.backgroundColor = 'var(--success)';
                    
                    setTimeout(() => {
                        window.location.href = '/dashboard'; // Vai para o dashboard
                    }, 500);
                } else {
                    erroLoginMsg.style.display = 'flex';
                    restaurarBotao(btnSubmit, textoOriginal);
                    document.getElementById('senha').value = ''; // Limpa a senha por segurança
                    document.getElementById('senha').focus();
                }
            } catch (erro) {
                console.error(erro);
                alert("Erro de conexão com o servidor. O back-end está a rodar?");
                restaurarBotao(btnSubmit, textoOriginal);
            }
        });

        function restaurarBotao(btn, texto) {
            btn.innerHTML = texto;
            btn.disabled = false;
        }
    </script>
</body>
</html>
