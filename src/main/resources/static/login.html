<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Bolão Ademicon</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --primary: #E31B23;
            --primary-hover: #b8141b;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --border-light: #e2e8f0;
            --danger: #ef4444;
            --danger-bg: #fef2f2;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }

        body {
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }

        .brand-logo {
            display: flex;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        .brand-logo i {
            font-size: 3.5rem;
            color: var(--primary);
            filter: drop-shadow(0 4px 6px rgba(227, 27, 35, 0.3));
        }

        .form-container {
            width: 100%;
            max-width: 440px;
            background: var(--card-bg);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.8);
            display: flex;
            flex-direction: column;
            animation: fadeSlideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes fadeSlideUp { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .title-page {
            font-size: 1.7rem;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 8px;
            text-align: center;
            letter-spacing: -0.5px;
        }

        .subtitle-page {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 30px;
            font-weight: 500;
        }

        .input-group { width: 100%; margin-bottom: 20px; position: relative; }
        
        .input-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 41px;
            font-size: 1.2rem;
            color: #94a3b8;
        }

        .input-control {
            width: 100%;
            padding: 14px 16px 14px 45px;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-dark);
            background: #f1f5f9;
            border: 2px solid transparent;
            border-radius: 12px;
            transition: all 0.2s ease;
            outline: none;
        }

        .input-control::placeholder { color: #94a3b8; font-weight: 500; }
        .input-control:focus { background: #ffffff; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(227, 27, 35, 0.1); }
        .input-control:focus + .input-icon { color: var(--primary); }

        .error-message {
            color: var(--danger);
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: var(--danger-bg);
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #fecaca;
            width: 100%;
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .form-options {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            margin-top: -5px;
        }

        .checkbox-group { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .checkbox-group input[type="checkbox"] {
            appearance: none; width: 20px; height: 20px;
            border: 2px solid var(--border-light); border-radius: 6px;
            background-color: #f1f5f9; cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: 0.2s;
        }
        .checkbox-group input[type="checkbox"]:checked { background-color: var(--primary); border-color: var(--primary); }
        .checkbox-group input[type="checkbox"]:checked::after { content: "✔"; color: white; font-size: 0.85rem; font-weight: bold; }
        .checkbox-group label { font-size: 0.9rem; font-weight: 600; color: var(--text-muted); cursor: pointer; user-select: none; }

        .link-recuperar { font-size: 0.9rem; font-weight: 700; color: var(--primary); text-decoration: none; transition: 0.2s; }
        .link-recuperar:hover { color: var(--primary-hover); text-decoration: underline; }

        .btn-ademicon {
            width: 100%; padding: 16px; font-size: 1.1rem; font-weight: 700; color: #FFF;
            background: linear-gradient(135deg, var(--primary) 0%, #b8141b 100%);
            border: none; border-radius: 12px; cursor: pointer; transition: all 0.3s ease;
            box-shadow: 0 6px 15px rgba(227, 27, 35, 0.25);
            display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        .btn-ademicon:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(227, 27, 35, 0.35); }
        .btn-ademicon:active:not(:disabled) { transform: translateY(0); }
        .btn-ademicon:disabled { opacity: 0.7; cursor: not-allowed; }

        .link-secundario {
            font-size: 0.95rem; font-weight: 500; color: var(--text-muted);
            text-decoration: none; margin-top: 30px; text-align: center; display: block;
        }
        .link-secundario strong { color: var(--text-dark); font-weight: 700; transition: 0.2s; }
        .link-secundario:hover strong { color: var(--primary); }

        @media (max-width: 500px) {
            .form-container { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <div class="form-container">
        <div class="brand-logo"><i class="ph-fill ph-trophy"></i></div>
        <h2 class="title-page">Bolão Ademicon</h2>
        <p class="subtitle-page">Acesse sua conta para continuar</p>

        <div id="erro-login" class="error-message">
            <i class="ph-bold ph-warning-circle" style="font-size: 1.2rem;"></i> E-mail ou senha incorretos.
        </div>

        <form id="form-login" style="width: 100%;">
            
            <div class="input-group">
                <label class="input-label" for="email">E-mail</label>
                <input type="email" id="email" class="input-control" placeholder="seuemail@exemplo.com" required autocomplete="email">
                <i class="ph-bold ph-envelope-simple input-icon"></i>
            </div>

            <div class="input-group" style="margin-bottom: 15px;">
                <label class="input-label" for="senha">Senha</label>
                <input type="password" id="senha" class="input-control" placeholder="Digite sua senha" required>
                <i class="ph-bold ph-lock-key input-icon"></i>
            </div>

            <div class="form-options">
                <label class="checkbox-group">
                    <input type="checkbox" id="lembrar" name="remember-me"> 
                    <span>Lembrar-me</span>
                </label>
                <a href="/recuperar-senha" class="link-recuperar">Esqueceu a senha?</a>
            </div>

            <button type="submit" id="btn-submit" class="btn-ademicon">
                Entrar no Jogo <i class="ph-bold ph-sign-in"></i>
            </button>

            <a href="/cadastro" class="link-secundario">Ainda não tem palpite? <strong>Cadastre-se</strong></a>
        </form>
    </div>

    <script>
        document.getElementById('form-login').addEventListener('submit', async function(event) {
            event.preventDefault();

            const btnSubmit = document.getElementById('btn-submit');
            const email = document.getElementById('email').value.trim();
            const senha = document.getElementById('senha').value;
            const erroLoginMsg = document.getElementById('erro-login');

            erroLoginMsg.style.display = 'none';

            const textoOriginal = btnSubmit.innerHTML;
            btnSubmit.innerHTML = '<i class="ph-bold ph-spinner ph-spin"></i> Autenticando...';
            btnSubmit.disabled = true;

            const payload = { email: email, senha: senha };

            try {
                const resposta = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (resposta.ok) {
                    btnSubmit.innerHTML = '<i class="ph-bold ph-check"></i> Redirecionando...';
                    btnSubmit.style.background = 'linear-gradient(135deg, #059669 0%, #047857 100%)';
                    
                    setTimeout(() => {
                        window.location.href = '/dashboard'; 
                    }, 500);
                } else {
                    erroLoginMsg.style.display = 'flex';
                    restaurarBotao(btnSubmit, textoOriginal);
                    document.getElementById('senha').value = ''; 
                    document.getElementById('senha').focus();
                }
            } catch (erro) {
                alert("Erro de conexão com o servidor.");
                restaurarBotao(btnSubmit, textoOriginal);
            }
        });

        function restaurarBotao(btn, texto) {
            btn.innerHTML = texto;
            btn.disabled = false;
        }
    </script>
</body>
</html>
